<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Klaras Fehler-Detektiv</title>
    <style>
        :root {
            --primary-pink: #ff85a1;
            --soft-pink: #fce4ec;
            --correct-green: #2ecc71;
            --error-red: #e74c3c;
            --bg-color: #fff0f3;
        }

        body { font-family: sans-serif; background-color: var(--bg-color); padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); max-width: 700px; width: 100%; border: 3px solid var(--primary-pink); }
        
        h1 { color: var(--primary-pink); text-align: center; }
        
        .prompt-box { background: #fafafa; border: 1px dashed #ccc; padding: 10px; border-radius: 10px; font-size: 0.8em; margin-bottom: 20px; }
        code { display: block; background: #eee; padding: 10px; margin-top: 5px; word-break: break-all; }

        .story-box { line-height: 2.5; font-size: 1.3em; padding: 20px; background: #fff; border: 2px solid var(--soft-pink); border-radius: 15px; margin-bottom: 20px; }
        
        .word { cursor: pointer; padding: 2px 5px; border-radius: 5px; transition: 0.2s; display: inline-block; }
        
        /* Korrektur-Zustand */
        .is-correct { color: white !important; background: var(--correct-green) !important; font-weight: bold; }
        
        /* Fehler-Zustand */
        .wrong-click { background-color: var(--error-red) !important; color: white !important; animation: shake 0.3s; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .stats { display: flex; justify-content: space-around; background: var(--soft-pink); padding: 15px; border-radius: 15px; font-weight: bold; color: #d81b60; }

        textarea { width: 100%; height: 100px; padding: 10px; border-radius: 10px; border: 2px solid var(--soft-pink); box-sizing: border-box; }
        button { background: var(--primary-pink); color: white; border: none; padding: 15px 25px; border-radius: 30px; cursor: pointer; font-weight: bold; margin-top: 10px; width: 100%; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>✨ Klaras Fehler-Detektiv ✨</h1>

    <div id="setup">
        <div class="prompt-box">
            <strong>Anweisung für Gemini:</strong>
            <code>Handle als Experte für bayerische Grundschulen (4. Klasse). Erstelle ein JSON-Rätsel aus meinem Text. Baue 5 Fehler ein. NUR JSON zurückgeben: {"display_words": [{"w": "Wort", "correct": true, "solution": "Wort"}]}</code>
        </div>
        <textarea id="jsonInput" placeholder="Kopiere das JSON von Gemini hier hinein..."></textarea>
        <button onclick="spielStarten()">Spiel starten 🪄</button>
    </div>

    <div id="game" class="hidden">
        <div class="story-box" id="textDisplay"></div>
