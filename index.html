<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Pferde-Detektiv KI</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fdf5e6; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 15px; max-width: 700px; margin: auto; border: 2px solid #deb887; }
        .word { cursor: default; padding: 0 2px; font-size: 1.3em; line-height: 2; }
        .is-correct { color: #228b22 !important; font-weight: bold; background: #d8f3dc; border-radius: 4px; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; }
        button { background: #8b4513; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🐴 Pferde-Detektiv (KI Edition)</h1>

    <div id="setup">
        <p>1. Text in Gemini einfügen & JSON kopieren.<br>
           2. JSON hier einfügen:</p>
        <textarea id="jsonInput" placeholder='Füge hier das {"display_words": ...} von Gemini ein'></textarea><br>
        <button onclick="starteKIReatsel()">Spiel laden</button>
    </div>

    <div id="game" class="hidden">
        <div id="textDisplay"></div>
        <p>Gefundene Fehler: <span id="found">0</span> / <span id="total">0</span></p>
        <button onclick="location.reload()">Neues Rätsel</button>
    </div>
</div>

<script>
    function starteKIReatsel() {
        try {
            const data = JSON.parse(document.getElementById('jsonInput').value);
            const display = document.getElementById('textDisplay');
            let fehlerGesamt = 0;
            let gefunden = 0;

            data.display_words.forEach(obj => {
                const span = document.createElement('span');
                span.className = "word";
                span.innerText = obj.w + " ";

                if (obj.correct === false) {
                    fehlerGesamt++;
                    span.onclick = function() {
                        if (!this.classList.contains('is-correct')) {
                            this.innerText = obj.solution + " ";
                            this.classList.add('is-correct');
                            gefunden++;
                            document.getElementById('found').innerText = gefunden;
                            if(gefunden === fehlerGesamt) alert("Wahnsinn! Alles korrigiert! 🌟");
                        }
                    };
                }
                display.appendChild(span);
            });

            document.getElementById('total').innerText = fehlerGesamt;
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');
        } catch (e) {
            alert("Das war kein gültiger KI-Code. Bitte kopiere das komplette JSON von Gemini.");
        }
    }
</script>
</body>
</html>
