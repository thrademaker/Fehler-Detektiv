<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Pferde-Detektiv</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fdf5e6; padding: 40px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 700px; margin: auto; }
        h1 { color: #8b4513; text-align: center; }
        
        /* Der Textbereich */
        .story-box { line-height: 2; font-size: 1.3em; padding: 20px; border: 1px solid #eee; border-radius: 10px; }
        
        /* WICHTIG: Alle Wörter sehen exakt gleich aus */
        .word { 
            cursor: default; /* Verhindert das "Hand"-Symbol beim Drüberfahren */
            padding: 0 2px;
            color: #333;
            font-weight: normal; 
            text-decoration: none;
        }

        /* Erst wenn es korrigiert wurde, wird es grün */
        .is-correct { 
            color: #228b22 !important; 
            font-weight: bold !important; 
            transition: color 0.3s ease;
        }

        .admin-area { margin-bottom: 20px; text-align: center; }
        textarea { width: 100%; height: 80px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc; padding: 10px; }
        button { background: #8b4513; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>🐴 Pferde-Detektiv</h1>

    <div class="admin-area" id="adminArea">
        <textarea id="inputText" placeholder="Kopiere hier einen Text über Pferde hinein..."></textarea><br>
        <button onclick="spielStarten()">Rätsel starten</button>
    </div>

    <div id="gameArea" style="display:none;">
        <div class="story-box" id="textDisplay"></div>
        <p style="text-align: center; margin-top: 20px;">
            Gefundene Fehler: <span id="found">0</span> / <span id="total">0</span>
        </p>
    </div>
</div>

<script>
    const fehlerDatenbank = {
        "Pferd": "ferd", "Pferde": "ferde", "Mähne": "Mäne", "reiten": "reitn", 
        "galoppieren": "galopieren", "Koppel": "Kopel", "Sattel": "Satel", 
        "Fohlen": "Folen", "Hufe": "Hufe", "Stall": "Stal", "Wiese": "Wise"
    };

    function spielStarten() {
        const rohText = document.getElementById('inputText').value;
        const woerter = rohText.split(/\s+/);
        const display = document.getElementById('textDisplay');
        display.innerHTML = "";
        let fehlerZaehler = 0;

        woerter.forEach(wort => {
            let nurWort = wort.replace(/[.,!?;]/g, "");
            let satzzeichen = wort.replace(/[a-zA-ZäöüÄÖÜß]/g, "");
            
            const span = document.createElement('span');
            span.className = "word";
            
            // Logik: Ist das Wort in unserer Fehlerliste?
            if (fehlerDatenbank[nurWort]) {
                span.innerText = fehlerDatenbank[nurWort] + satzzeichen + " ";
                span.dataset.correct = nurWort + satzzeichen;
                span.onclick = function() {
                    if (!this.classList.contains('is-correct')) {
                        this.innerText = this.dataset.correct + " ";
                        this.classList.add('is-correct');
                        updateScore();
                    }
                };
                fehlerZaehler++;
            } else {
                span.innerText = wort + " ";
                // Optional: Klick auf richtiges Wort gibt kurzes "Schade"-Signal? 
                // Aktuell passiert einfach nichts.
            }
            display.appendChild(span);
        });

        document.getElementById('total').innerText = fehlerZaehler;
        document.getElementById('adminArea').style.display = 'none';
        document.getElementById('gameArea').style.display = 'block';
    }

    let gefundene = 0;
    function updateScore() {
        gefundene++;
        document.getElementById('found').innerText = gefundene;
        if (gefundene == document.getElementById('total').innerText) {
            alert("Klasse! Du hast alle Fehler entdeckt! 🌟");
        }
    }
</script>
</body>
</html>
