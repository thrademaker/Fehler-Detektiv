<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Klaras Fehler-Detektiv</title>
    <style>
        :root { --p: #ff85a1; --s: #fce4ec; --red: #e74c3c; --green: #2ecc71; --blue: #3498db; }
        
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #fff0f3; padding: 20px; text-align: center; color: #333; }
        .container { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 850px; margin: auto; border: 3px solid var(--p); }
        
        /* Druck-Optimierung: Erzwingt Farben im PDF */
        @media print {
            body { background: white !important; padding: 0 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .container { border: 2px solid var(--p) !important; box-shadow: none !important; max-width: 100% !important; width: 100% !important; }
            button, #setup, .no-print { display: none !important; }
            .is-correct { background-color: var(--green) !important; color: white !important; border-radius: 4px; padding: 2px 4px; }
            .wrong-click { background-color: var(--red) !important; color: white !important; border-radius: 4px; padding: 2px 4px; }
            .missed-error { background-color: var(--blue) !important; color: white !important; border-radius: 4px; padding: 2px 4px; }
            .stats { border: 2px solid var(--p) !important; background: var(--s) !important; }
        }

        h1 { color: var(--p); margin-top: 0; }
        .prompt-box { background: #fafafa; border: 1px dashed #ccc; padding: 12px; border-radius: 12px; text-align: left; font-size: 0.85em; margin-bottom: 20px; }
        code { display: block; background: #eee; padding: 8px; margin-top: 5px; word-break: break-all; border-radius: 5px; }
        
        .story-box { line-height: 2.8; font-size: 1.35em; padding: 25px; background: #fff; border: 2px solid var(--s); border-radius: 20px; text-align: left; margin-bottom: 20px; min-height: 100px; }
        .word { cursor: pointer; padding: 2px 4px; display: inline-block; border-radius: 6px; transition: 0.1s; }
        
        .is-correct { background-color: var(--green); color: white; font-weight: bold; }
        .wrong-click { background-color: var(--red); color: white; }
        .missed-error { background-color: var(--blue); color: white; font-weight: bold; }
        
        .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; background: var(--s); padding: 15px; border-radius: 15px; font-weight: bold; margin-top: 20px; }
        .stat-val { font-size: 1.4em; display: block; }

        textarea { width: 100%; height: 120px; border-radius: 10px; border: 2px solid var(--s); padding: 10px; box-sizing: border-box; font-family: monospace; }
        
        .btn-group { margin-top: 15px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        button { background: var(--p); color: white; border: none; padding: 12px 24px; border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 1em; }
        button:hover { filter: brightness(1.05); }
        .btn-example { background: #9b59b6; }
        .btn-finish { background: #34495e; }
        .btn-print { background: #555; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>✨ Klaras Fehler-Detektiv ✨</h1>

    <div id="setup">
        <div class="prompt-box">
            <strong>Prompt für Gemini:</strong>
            <code>Erstelle ein bayerisches 4.-Klasse-Rätsel. Baue 8-12 Fehler ein (Nominalisierung, Dehnung, ck/tz, das/dass). Antworte NUR als JSON: {"display_words": [{"w": "Wort", "correct": true, "solution": "Wort"}]}</code>
        </div>
        <textarea id="jsonInput" placeholder="JSON hier einfügen..."></textarea>
        <div class="btn-group">
            <button onclick="loadExample()" class="btn-example">Beispieltext laden 📖</button>
            <button id="startBtn">Rätsel starten 🪄</button>
        </div>
    </div>

    <div id="game" class="hidden">
        <div class="story-box" id="textDisplay"></div>
        
        <div class="stats">
            <div style="color: var(--green);">Gefunden<span id="found" class="stat-val">0</span></div>
            <div style="color: var(--red);">Falsch getippt<span id="misses" class="stat-val">0</span></div>
            <div style="color: var(--blue);">Übersehen<span id="missed" class="stat-val">0</span></div>
        </div>

        <div class="btn-group no-print">
            <button id="finishBtn" class="btn-finish">Auswertung anzeigen 🏁</button>
            <button onclick="window.print()" class="btn-print">Als PDF speichern / Drucken 🖨️</button>
            <button onclick="location.reload()" style="background:#bbb;">Anderer Text</button>
        </div>
    </div>
</div>

    document.getElementById('startBtn').addEventListener('click', function() {
        let input = document.getElementById('jsonInput').value;
        const start = input.indexOf('{');
        const end = input.lastIndexOf('}');
        if (start === -1 || end === -1) return alert("Code nicht gefunden!");
        
        try {
            const data = JSON.parse(input.substring(start, end + 1).replace(/\n/g, " "));
            rawData = data.display_words;
            const container = document.getElementById('textDisplay');
            container.innerHTML = "";
            gameActive = true;
            
            let totalErrors = rawData.filter(w => !w.correct).length;
            document.getElementById('found').parentElement.innerHTML = `Gefunden <span id="found" class="stat-val">0 / ${totalErrors}</span>`;

            rawData.forEach((item, idx) => {
                const span = document.createElement('span');
                span.innerText = item.w + " ";
                span.className = "word";
                span.id = "w-" + idx;

                span.onclick = function() {
                    if (!gameActive) return;
                    if (item.correct === false) {
                        if (!this.classList.contains('is-correct')) {
                            this.innerText = item.solution + " ";
                            this.classList.add('is-correct');
                            this.classList.remove('wrong-click');
                            updateStats();
                        }
                    } else {
                        if (!this.classList.contains('is-correct') && !this.classList.contains('wrong-click')) {
                            this.classList.add('wrong-click');
                            updateStats();
                        }
                    }
                };
                container.appendChild(span);
            });

            document.getElementById('setup').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');
        } catch (e) { alert("JSON Fehler!"); }
    });

    function updateStats() {
        const found = document.querySelectorAll('.is-correct').length;
        const misses = document.querySelectorAll('.wrong-click').length;
        const total = rawData.filter(w => !w.correct).length;
        document.getElementById('found').innerText = `${found} / ${total}`;
        document.getElementById('misses').innerText = misses;
    }

    document.getElementById('finishBtn').addEventListener('click', function() {
        gameActive = false;
        let missedCount = 0;
        rawData.forEach((item, idx) => {
            const el = document.getElementById('w-' + idx);
            if (item.correct === false && !el.classList.contains('is-correct')) {
                el.classList.add('missed-error');
                missedCount++;
            }
        });
        document.getElementById('missed').innerText = missedCount;
        this.disabled = true;
        this.style.opacity = "0.5";
    });
