<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Klaras Fehler-Detektiv</title>
    <style>
        body { font-family: sans-serif; background-color: #fff0f3; padding: 20px; text-align: center; }
        .container { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 600px; margin: auto; border: 3px solid #ff85a1; }
        h1 { color: #ff85a1; }
        textarea { width: 90%; height: 100px; margin-top: 10px; border-radius: 10px; border: 2px solid #fce4ec; padding: 10px; }
        .word { cursor: pointer; padding: 2px 5px; display: inline-block; font-size: 1.2em; line-height: 2; border-radius: 5px; }
        .is-correct { background-color: #2ecc71 !important; color: white !important; font-weight: bold; }
        .wrong-click { background-color: #e74c3c !important; color: white !important; }
        .hidden { display: none; }
        .stats { margin-top: 20px; font-weight: bold; color: #d81b60; }
        button { background: #ff85a1; color: white; border: none; padding: 15px 30px; border-radius: 30px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>✨ Klaras Fehler-Detektiv ✨</h1>

    <div id="setup">
        <p>JSON hier einfügen:</p>
        <textarea id="jsonInput" placeholder='{ "display_words": [...] }'></textarea><br>
        <button id="startBtn">Spiel starten 🪄</button>
    </div>

    <div id="game" class="hidden">
        <div id="textDisplay" style="text-align: left; padding: 20px; background: #fff; border: 1px solid #eee; border-radius: 10px;"></div>
        <div class="stats">
            🌟 Gefunden: <span id="found">0</span> / <span id="total">0</span> | 
            ❌ Fehler: <span id="misses">0</span>
        </div>
        <button onclick="location.reload()">Neuer Text</button>
    </div>
</div>

<script>
    // Wir nutzen eine sicherere Methode, um den Klick abzufangen
    document.getElementById('startBtn').addEventListener('click', function() {
        let raw = document.getElementById('jsonInput').value;
        
        // 1. Bereinigung
        let clean = raw.replace(/```json/g, "").replace(/```/g, "").trim();
        
        if (!clean) {
            alert("Bitte zuerst etwas in das Textfeld einfügen!");
            return;
        }

        try {
            const data = JSON.parse(clean);
            const container = document.getElementById('textDisplay');
            container.innerHTML = "";
            
            let foundCount = 0;
            let missCount = 0;
            let errorWords = data.display_words.filter(w => w.correct === false);
            let totalToFind = errorWords.length;

            document.getElementById('total').innerText = totalToFind;

            data.display_words.forEach(item => {
                const span = document.createElement('span');
                span.innerText = item.w + " ";
                span.className = "word";

                span.onclick = function() {
                    if (item.correct === false) {
                        if (!this.classList.contains('is-correct')) {
                            this.innerText = item.solution + " ";
                            this.classList.add('is-correct');
                            this.classList.remove('wrong-click');
                            foundCount++;
                            document.getElementById('found').innerText = foundCount;
                            if (foundCount === totalToFind) alert("Super, Klara! Alles geschafft! 👑");
                        }
                    } else {
                        if (!this.classList.contains('is-correct')) {
                            missCount++;
                            document.getElementById('misses').innerText = missCount;
                            this.classList.add('wrong-click');
                            setTimeout(() => this.classList.remove('wrong-click'), 500);
                        }
                    }
                };
                container.appendChild(span);
            });

            document.getElementById('setup').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');

        } catch (err) {
            alert("Fehler im JSON-Format! Bitte kopiere den Text von Gemini erneut. Fehler-Info: " + err.message);
        }
    });
</script>

</body>
</html>
