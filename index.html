<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Fehler-Detektiv</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fdf5e6; padding: 40px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 700px; margin: auto; }
        h1 { color: #8b4513; text-align: center; }
        
        /* Der Textbereich */
        .story-box { line-height: 2; font-size: 1.3em; padding: 20px; border: 1px solid #eee; border-radius: 10px; }
        
        /* WICHTIG: Alle Wörter sehen exakt gleich aus */
        .word { 
            cursor: default; /* Verhindert das "Hand"-Symbol beim Drüberfahren */
            padding: 0 2px;
            color: #333;
            font-weight: normal; 
            text-decoration: none;
        }

        /* Erst wenn es korrigiert wurde, wird es grün */
        .is-correct { 
            color: #228b22 !important; 
            font-weight: bold !important; 
            transition: color 0.3s ease;
        }

        .admin-area { margin-bottom: 20px; text-align: center; }
        textarea { width: 100%; height: 80px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc; padding: 10px; }
        button { background: #8b4513; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>🦄 Klaras Fehler-Detektiv</h1>

    <div class="admin-area" id="adminArea">
        <textarea id="inputText" placeholder="Kopiere hier einen Text über Pferde hinein..."></textarea><br>
        <button onclick="spielStarten()">Rätsel starten</button>
    </div>

    <div id="gameArea" style="display:none;">
        <div class="story-box" id="textDisplay"></div>
        <p style="text-align: center; margin-top: 20px;">
            Gefundene Fehler: <span id="found">0</span> / <span id="total">0</span>
        </p>
    </div>
</div>

    <script>
    // Diesen Datensatz würden wir von Gemini bekommen
    let aktuellesRaetsel = []; 

    function ladeKIStruktur(jsonVonGemini) {
        const daten = JSON.parse(jsonVonGemini);
        const display = document.getElementById('textDisplay');
        display.innerHTML = "";
        let fehlerGesamt = 0;

        daten.display_words.forEach(obj => {
            const span = document.createElement('span');
            span.className = "word";
            span.innerText = obj.w + " ";

            if (obj.correct === false) {
                fehlerGesamt++;
                span.onclick = function() {
                    if (!this.classList.contains('is-correct')) {
                        this.innerText = obj.solution + " ";
                        this.classList.add('is-correct');
                        checkWin(fehlerGesamt);
                    }
                };
            }
            display.appendChild(span);
        });
        document.getElementById('total').innerText = fehlerGesamt;
    }

    let gefundene = 0;
    function checkWin(total) {
        gefundene++;
        document.getElementById('found').innerText = gefundene;
        if (gefundene === total) alert("KI-Rätsel gelöst! Super!");
    }
</script>

</body>

</html>
