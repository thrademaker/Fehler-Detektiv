<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Klaras Fehler-Detektiv</title>
    <style>
        :root { --p: #ff85a1; --s: #fce4ec; }
        body { font-family: sans-serif; background: #fff0f3; padding: 20px; text-align: center; color: #444; }
        .container { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 650px; margin: auto; border: 3px solid var(--p); }
        h1 { color: var(--p); margin-bottom: 10px; }
        .prompt-box { background: #fafafa; border: 1px dashed #ccc; padding: 10px; border-radius: 10px; font-size: 0.8em; margin-bottom: 20px; text-align: left; }
        textarea { width: 100%; height: 120px; border-radius: 10px; border: 2px solid var(--s); padding: 10px; box-sizing: border-box; }
        .word { cursor: pointer; padding: 2px 4px; display: inline-block; font-size: 1.3em; line-height: 2.2; border-radius: 5px; transition: 0.2s; }
        .is-correct { background-color: #2ecc71 !important; color: white !important; font-weight: bold; }
        .wrong-click { background-color: #e74c3c !important; color: white !important; animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
        .stats { margin-top: 20px; font-size: 1.2em; font-weight: bold; color: #d81b60; display: flex; justify-content: space-around; background: var(--s); padding: 15px; border-radius: 15px; }
        button { background: var(--p); color: white; border: none; padding: 15px 30px; border-radius: 30px; cursor: pointer; font-weight: bold; margin-top: 15px; width: 100%; font-size: 1.1em; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>✨ Klaras Fehler-Detektiv ✨</h1>

    <div id="setup">
        <div class="prompt-box">
            <strong>Kopiere das für Gemini:</strong><br>
            <code>Erstelle ein JSON-Rätsel aus meinem Text (Lehrplan Bayern 4. Klasse). Baue 5-8 Fehler ein. Antworte NUR mit dem JSON-Objekt: {"display_words": [{"w": "Wort", "correct": true, "solution": "Wort"}]}</code>
        </div>
        <textarea id="jsonInput" placeholder="Kopiere die gesamte Antwort von Gemini hier hinein..."></textarea>
        <button id="startBtn">Spiel zaubern 🪄</button>
    </div>

    <div id="game" class="hidden">
        <div id="textDisplay" style="text-align: left; padding: 10px;"></div>
        <div class="stats">
            <span>🌟 Gefunden: <span id="found">0</span> / <span id="total">0</span></span>
            <span>❌ Fehler: <span id="misses">0</span></span>
        </div>
        <button onclick="location.reload()" style="background:#999;">Anderer Text</button>
    </div>
</div>

<script>
    document.getElementById('startBtn').addEventListener('click', function() {
        let input = document.getElementById('jsonInput').value;
        
        // DER TRICK: Wir suchen den Text zwischen der ersten { und der letzten }
        const start = input.indexOf('{');
        const end = input.lastIndexOf('}');
        
        if (start === -1 || end === -1) {
            alert("Kein gültiger Code gefunden. Hast du die Antwort von Gemini kopiert?");
            return;
        }
        
        const jsonString = input.substring(start, end + 1);

        try {
            const data = JSON.parse(jsonString);
            const container = document.getElementById('textDisplay');
            container.innerHTML = "";
            
            let foundCount = 0;
            let missCount = 0;
            const errorWords = data.display_words.filter(w => !w.correct);
            const totalToFind = errorWords.length;

            document.getElementById('total').innerText = totalToFind;

            data.display_words.forEach(item => {
                const span = document.createElement('span');
                span.innerText = item.w + " ";
                span.className = "word";

                span.onclick = function() {
                    if (item.correct === false) {
                        if (!this.classList.contains('is-correct')) {
                            this.innerText = item.solution + " ";
                            this.classList.add('is-correct');
                            this.classList.remove('wrong-click');
                            foundCount++;
                            document.getElementById('found').innerText = foundCount;
                            if (foundCount === totalToFind) setTimeout(() => alert("Klasse, Klara! 👑"), 200);
                        }
                    } else {
                        if (!this.classList.contains('is-correct')) {
                            missCount++;
                            document.getElementById('misses').innerText = missCount;
                            this.classList.add('wrong-click');
                            setTimeout(() => this.classList.remove('wrong-click'), 500);
                        }
                    }
                };
                container.appendChild(span);
            });

            document.getElementById('setup').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');

        } catch (err) {
            alert("Fehler: " + err.message + "\nVersuche nur den Teil zwischen { und } zu kopieren.");
        }
    });
</script>

</body>
</html>
