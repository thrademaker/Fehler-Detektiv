<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Klaras Fehler-Detektiv</title>
    <style>
        :root { --p: #ff85a1; --s: #fce4ec; --red: #e74c3c; --green: #2ecc71; }
        body { font-family: 'Comic Sans MS', 'Segoe UI', sans-serif; background: #fff0f3; padding: 20px; text-align: center; }
        .container { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(255, 133, 161, 0.2); max-width: 800px; margin: auto; border: 3px solid var(--p); }
        h1 { color: var(--p); font-size: 2.2em; margin-bottom: 10px; }
        .prompt-box { background: #fafafa; border: 1px dashed #ccc; padding: 15px; border-radius: 12px; text-align: left; font-size: 0.9em; margin-bottom: 20px; line-height: 1.4; }
        code { display: block; background: #eee; padding: 10px; margin-top: 10px; word-break: break-all; border-radius: 5px; color: #444; font-family: monospace; }
        .story-box { line-height: 2.8; font-size: 1.4em; padding: 25px; background: #fff; border: 2px solid var(--s); border-radius: 20px; text-align: left; margin-bottom: 20px; }
        .word { cursor: pointer; padding: 3px 6px; display: inline-block; border-radius: 8px; transition: 0.2s; }
        .is-correct { background-color: var(--green) !important; color: white !important; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .wrong-click { background-color: var(--red) !important; color: white !important; animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
        .stats { display: flex; justify-content: space-around; background: var(--s); padding: 15px; border-radius: 15px; font-weight: bold; color: #d81b60; margin-top: 20px; font-size: 1.2em; }
        textarea { width: 100%; height: 120px; border-radius: 10px; border: 2px solid var(--s); padding: 10px; box-sizing: border-box; font-family: monospace; font-size: 0.9em; }
        button { background: var(--p); color: white; border: none; padding: 15px 30px; border-radius: 30px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; font-size: 1.2em; transition: 0.2s; }
        button:hover { background: #ff5c8d; transform: translateY(-2px); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
