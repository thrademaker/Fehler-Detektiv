<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Klaras Fehler-Detektiv</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fdf5e6; padding: 20px; color: #4a2c2a; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); max-width: 800px; margin: auto; border: 4px solid #deb887; }
        h1 { color: #8b4513; text-align: center; font-size: 2.2em; }
        
        /* Das Spielfeld */
        .story-box { line-height: 2.5; font-size: 1.4em; padding: 25px; background: #fff; border-radius: 15px; border: 1px solid #eee; margin-bottom: 20px; }
        
        .word { cursor: default; padding: 2px 4px; border-radius: 5px; transition: 0.2s; }
        
        /* Richtig korrigiert */
        .is-correct { color: #2d6a4f !important; font-weight: bold; background: #d8f3dc; }
        
        /* Fehlklick-Animation */
        .wrong-click { animation: shake 0.4s; background-color: #ffdce0; }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        /* Anzeigen */
        .stats-bar { display: flex; justify-content: space-around; font-size: 1.2em; font-weight: bold; margin-top: 20px; padding: 10px; background: #fff8f0; border-radius: 10px; }
        .error-count { color: #b22222; }
        .success-count { color: #2d6a4f; }

        /* Setup-Bereich */
        textarea { width: 100%; height: 100px; border-radius: 8px; border: 1px solid #ccc; padding: 10px; box-sizing: border-box; }
        button { background: #8b4513; color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔍 Klaras Fehler-Detektiv</h1>

    <div id="setup">
        <p>Füge hier das JSON-Rätsel von Gemini ein:</p>
        <textarea id="jsonInput" placeholder='{"display_words": [...] }'></textarea><br>
        <button onclick="starteSpiel()">Rätsel laden 🚀</button>
    </div>

    <div id="game" class="hidden">
        <div class="story-box" id="textDisplay"></div>
        
        <div class="stats-bar">
            <div class="success-count">Gefundene Fehler: <span id="found">0</span> / <span id="total">0</span></div>
            <div class="error-count">Fehlversuche: <span id="misses">0</span></div>
        </div>
        
        <div style="text-align:center; margin-top: 20px;">
            <button onclick="location.reload()" style="background: #666;">Neues Rätsel erstellen</button>
        </div>
    </div>
</div>

<script>
    let gefunden = 0;
    let fehlversuche = 0;
    let fehlerGesamt = 0;

    function starteSpiel() {
        try {
            const input = document.getElementById('jsonInput').value;
            const data = JSON.parse(input);
            const display = document.getElementById('textDisplay');
            display.innerHTML = "";
            
            gefunden = 0;
            fehlversuche = 0;
            fehlerGesamt = data.display_words.filter(w => w.correct === false).length;

            data.display_words.forEach(obj => {
                const span = document.createElement('span');
                span.className = "word";
                span.innerText = obj.w + " ";

                span.onclick = function() {
                    // Falls das Wort ein Fehler war und noch nicht korrigiert wurde
                    if (obj.correct === false && !this.classList.contains('is-correct')) {
                        this.innerText = obj.solution + " ";
                        this.classList.add('is-correct');
                        gefunden++;
                        document.getElementById('found').innerText = gefunden;
                        if(gefunden === fehlerGesamt) {
                            setTimeout(() => alert("Klasse gemacht, Klara! Du hast alle " + fehlerGesamt + " Fehler gefunden! 🏆"), 200);
                        }
                    } 
                    // Falls auf ein bereits korrektes Wort geklickt wurde
                    else if (obj.correct === true && !this.classList.contains('is-correct')) {
                        fehlversuche++;
                        document.getElementById('misses').innerText = fehlversuche;
                        this.classList.add('wrong-click');
                        setTimeout(() => this.classList.remove('wrong-click'), 400);
                    }
                };
                display.appendChild(span);
            });

            document.getElementById('total').innerText = fehlerGesamt;
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');
        } catch (e) {
            alert("Hoppla! Das JSON scheint nicht ganz korrekt zu sein. Bitte kopiere den Code nochmal aus Gemini.");
        }
    }
</script>

</body>
</html>
